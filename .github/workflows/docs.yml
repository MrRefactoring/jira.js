name: 📚 Documentation

on:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'src/**'
      - 'typedoc.json'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one (the build is long).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Build the VitePress site (TypeDoc → Markdown → static HTML) ───────────────
  build:
    name: 🛠️ Build site
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ⚙️ Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: 🏗️ Build documentation
        run: pnpm run docs:build
        env:
          # ~6.6k generated API pages — give the VitePress build a large heap.
          NODE_OPTIONS: --max-old-space-size=8192

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # ── Deploy the built artifact to GitHub Pages ─────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
