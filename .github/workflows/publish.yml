name: 🚀 Publish to NPM

on:
  push:
    tags:
      - 'v*.*.*'

env:
  NODE_VERSION: '22.x'

permissions:
  contents: read

jobs:
  build-and-test:
    name: 🏗️ Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🛠️ Run build
        run: pnpm run build

      - name: 🔍 Run lint
        run: pnpm run lint
        env:
          CI: true

  publish-package:
    name: 🚀 Publish Package
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4

      - name: 🔖 Get and validate version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            TAG_VERSION=${GITHUB_REF#refs/tags/v}
            echo "Using version from tag: $TAG_VERSION"
            CURRENT_VERSION=$(node -p "require('./package.json').version")

            if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
              echo "Updating package version to match tag..."
              npm version $TAG_VERSION --no-git-tag-version
              pnpm install
              git config user.name "GitHub Actions"
              git config user.email "actions@github.com"
              git add package.json pnpm-lock.yaml
              git commit -m "Update version to $TAG_VERSION [skip ci]"
              git push
            fi
          else
            TAG_VERSION=$(node -p "require('./package.json').version")
            echo "Using version from package.json: $TAG_VERSION"
          fi

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🛠️ Build package
        run: pnpm run build

      - name: 📤 Publish to NPM
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
