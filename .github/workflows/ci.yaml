name: 🛠️ CI

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
  repository_dispatch:
    types: [ pr-approved ]

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v4
      - name: ⚙️ Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 📌 Installing dependencies
        run: pnpm install --frozen-lockfile
      - name: 🛠️ Building sources
        run: pnpm run build

  lint:
    name: 🔍 Lint Code
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v4
      - name: ⚙️ Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 📌 Installing dependencies
        run: pnpm install --frozen-lockfile
      - name: ✨ Linting
        run: pnpm run lint
        env:
          CI: true

  test:
    name: 🧪 Unit Tests
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v4
      - name: ⚙️ Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ Build packages
        run: pnpm run build
      - name: 🧪 Unit tests — @jira.js/base
        run: pnpm --filter @jira.js/base test:unit
      - name: 🧪 Unit tests — @jira.js/cloud
        run: pnpm --filter @jira.js/cloud test:unit

  governance:
    name: 🔏 API Governance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v4
      - name: ⚙️ Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ Build packages
        run: pnpm run build
      - name: 📋 Validate package exports map
        run: node scripts/check-exports.mjs
      - name: 🔍 Check API surface snapshots
        run: node scripts/api-surface.mjs check

  release-cert:
    name: 🎓 Release Certification
    needs: [build, governance]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🔄 Checkout sources
        uses: actions/checkout@v4
      - name: ⚙️ Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: 📦 Install pnpm
        uses: pnpm/action-setup@v4
      - name: 📌 Install dependencies
        run: pnpm install --frozen-lockfile
      - name: 🏗️ Build packages
        run: pnpm run build
      - name: 🗜️ Validate packed tarballs
        run: node scripts/pack-validate.mjs
      - name: 🔬 Type resolution check (ATTW)
        run: node scripts/attw-check.mjs
      - name: 📏 Install size governance
        run: node scripts/size-check.mjs
      - name: 🧪 Consumer smoke tests
        run: node scripts/smoke-consumers.mjs
        env:
          npm_config_prefer_offline: 'false'
